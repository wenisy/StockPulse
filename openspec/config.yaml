schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  本项目使用以下目录结构：
  - docs/architecture/ — 架构设计（ADR、系统设计）
  - docs/api/ — API 接口定义
  - docs/guides/ — 开发指南（快速入门、工程规范）
  - docs/modules/ — 按模块划分的技术文档
  - docs/troubleshooting/ — 排障手册（Runbooks）
  - .mcp.json — MCP 服务配置（清单由 installer 模板生成）
  - openspec/ — 开发契约与变更管理
    - specs/ — 能力规格定义
    - changes/ — 活跃的变更提案
    - changes/archive/ — 已归档的变更

# 审查模式：默认并行（verify 和 review 同时启动，快）
# 如需串行（verify 通过后才启动 review），将下面改为 serial
review_mode: parallel

# openspec-installer:pair-feature v1
pair_feature:
  enabled: true
  skill_path: "~/.codebuddy/skills/openspec-pair-feature"
  trigger_signals:
    - '用户描述涉及前端调用后端 API（含 method/path/request/response 任一关键词）'
    - '用户描述同时出现"前端"+"后端"或 client/server/前台/后台 关键词'
    - '用户主动声明"跨前后端"/"前后端联调"/"前后端一起做"'
    - '当前 repo 名匹配 backend|api|server|frontend|web|mobile|admin 关键词'
    - '用户在 /opsx:propose 时仅给 change-id 而未描述端识别信息（隐含跨端，触发 upstream 扫描）'

rules:
  # openspec-installer:rules-archive v2
  archive:
    - "归档时 MUST 执行 /tcsc:archive-pipeline <change-name> 走完 5 步流程（git branch 检查 / unpushed commits 检查 / MR/PR 存在性反问 / openspec archive / INDEX 语义化更新）。所有详细检查与索引更新逻辑由 .codebuddy/commands/tcsc/archive-pipeline.md 与 .claude/commands/tcsc/archive-pipeline.md 单一维护，此处不再重复。"

  # openspec-installer:rules-apply v2
  apply:
    - |
      编码完成后 MUST 执行：/tcsc:review-pipeline <change-name>

      触发时机：所有【代码任务】标 [x] 的瞬间（不依赖元任务是否完成）。
      代码任务 vs 元任务边界识别：见 .codebuddy/rules/openspec-config-awareness.md
      与 .claude/rules/openspec-config-awareness.md 的"代码任务 vs 元任务边界识别"段
      （简版 + 关键词列表），详细启发式见 /tcsc:review-pipeline 命令体 Phase 0。

      输出禁令：进入审查阶段后，SHALL NOT 输出"现在可以执行 /opsx:archive"
      "或先用 /verify / /tcsc:code-review" 等降级表达；
      第一行 MUST 以"[审查] 启动审查流水线..."等执行声明开头。详见 bridge rule
      "完成态输出禁令"段。

      pipeline 返回后暂停，等待用户决定是否 /opsx:archive。
      不得在 pipeline 未完成时直接建议 archive。

      编排细节（团队创建、子 agent 启动、消息回传、并行/串行模式分支等）
      由 .codebuddy/commands/tcsc/review-pipeline.md 与 .claude/commands/
      tcsc/review-pipeline.md 单一维护，此处不再重复。

  # openspec-installer:pair-feature v1
  proposal:
    - |
      创建 proposal.md 前，AI MUST 先按 pair_feature.trigger_signals 自检当前 feature 是否跨端：

      1. 逐条检查 pair_feature.trigger_signals 列表中的 5 条信号
      2. 任一命中 → 判定为跨端 feature：
         - Read pair_feature.skill_path 下的 SKILL.md（懒加载完整流程）
         - 按 SKILL.md Step 1~5 执行串行协作流程
         - MUST NOT 仅凭 config.yaml 极简段独自完成 5 步流程
      3. 全部未命中 → 走正常 proposal 流程，不加载 pair-feature skill
      4. 读取 SKILL.md 失败 → MUST 提示用户"未能加载 pair-feature skill，是否手动指引继续？"，不得静默退化
