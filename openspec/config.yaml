schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  本项目使用以下目录结构：
  - docs/architecture/ — 架构设计（ADR、系统设计）
  - docs/api/ — API 接口定义
  - docs/guides/ — 开发指南（快速入门、工程规范）
  - docs/modules/ — 按模块划分的技术文档
  - docs/reviews/ — 审查经验 / review 规则 / 质量复盘
  - docs/troubleshooting/ — 排障手册（Runbooks）
  - .mcp.json — MCP 服务配置（清单由 installer 模板生成）
  - openspec/ — 开发契约与变更管理
    - specs/ — 能力规格定义
    - changes/ — 活跃的变更提案
    - changes/archive/ — 已归档的变更

# 审查模式：默认并行（verify 和 review 同时启动，快）
# 如需串行（verify 通过后才启动 review），将下面改为 serial
review_mode: parallel

# openspec-installer:pair-feature v1
pair_feature:
  enabled: true
  skill_path: "~/.codebuddy/skills/openspec-pair-feature"
  trigger_signals:
    - '用户描述涉及前端调用后端 API（含 method/path/request/response 任一关键词）'
    - '用户描述同时出现"前端"+"后端"或 client/server/前台/后台 关键词'
    - '用户主动声明"跨前后端"/"前后端联调"/"前后端一起做"'
    - '当前 repo 名匹配 backend|api|server|frontend|web|mobile|admin 关键词'
    - '用户在 /opsx:propose 时仅给 change-id 而未描述端识别信息（隐含跨端，触发 upstream 扫描）'

rules:
  # openspec-installer:rules-archive v3
  archive:
    - "/opsx:archive 时 MUST 执行 /tcsc:archive-pipeline <change-name>；详细归档流程由 .codebuddy/commands/tcsc/archive-pipeline.md 与 .claude/commands/tcsc/archive-pipeline.md 单一维护。"

  # openspec-installer:rules-apply v6
  apply:
    - "/opsx:apply 动手前 MUST 执行 /tcsc:apply-pipeline <change-id> 的 Phase 1~2 gate 检查（review-result gate + 测试存在性 gate + sentinel gate）；代码任务全部 [x] 后 post-apply 命令（review-pipeline）由 openspec-config-awareness.md 的 alwaysApply 强制执行。"

  # openspec-installer:rules-proposal v5
  proposal:
    - "/opsx:propose 开始前 MUST 执行 /tcsc:propose-pipeline <change-name> 的 clarify gate + docs 读取；propose 完成后 post-propose 命令（proposal-emit + propose-review）由 openspec-config-awareness.md 的 alwaysApply 强制执行。"
